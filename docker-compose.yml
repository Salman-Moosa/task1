services:
  app:
    build: .

    restart: unless-stopped

    ports:
      - "5001:5000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 10s
      retries: 5

  db:
    image: postgres:15

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    restart: unless-stopped

volumes:
  postgres_data:
