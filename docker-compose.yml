services:
  app:
    build: .

    restart: unless-stopped

    ports:
      - "5001:5000"

    env_file:
      - .env

    depends_on:
       db:
          condition: service_healthy
       redis:
          condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
       - backend   


  db:
    image: postgres:15-alpine

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      
      interval: 10s
      timeout: 5s
      retries: 5  

    networks:
       - backend   

  redis:
    image: redis:7-alpine

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
       - backend  



volumes:
  postgres_data:


networks:
    backend:
